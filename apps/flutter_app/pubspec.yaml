name: flutter_app
description: "Flutter lane for Telegram commercial MVP slice #1."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.2.4
  go_router: ^17.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/telegram-commercial-mvp/design-tokens.json
    - assets/telegram-commercial-mvp/shared-copy.json
    - assets/telegram-commercial-mvp/shared-mock-data.json
    - assets/telegram-commercial-mvp/resource-manifest.json
    - assets/telegram-commercial-mvp/resources/app-mark.svg
    - assets/telegram-commercial-mvp/resources/avatar-placeholder.svg
